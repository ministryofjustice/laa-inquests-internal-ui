name: CI

on:
  push:
    branches:
      - main
  pull_request:
    # From docs: if no activity types are specified, the workflow runs when a pull request is opened or reopened or when the head branch of the pull request is updated.
    paths:
      - "deploy/**"
      - ".github/**"
      - "src/**"
      - "tests/**"
      - "Dockerfile"
      - "yarn.lock"
  workflow_dispatch:
    inputs:
      environment:
        description: "Github deployment environment"
        required: false
        default: "uat"
        type: choice
        options:
          - uat
      notify_test_environment:
        description: "Optional Slack test target for manual runs"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - staging
          - prod
          - both
      notify_test_status:
        description: "Slack test status for manual runs"
        required: false
        default: "failure"
        type: choice
        options:
          - failure
          - success

jobs:
  code-linting:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_test_environment == 'none' }}
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node

      - name: Run ESLint
        run: yarn lint

  code-security-audit:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_test_environment == 'none' }}
    name: Code Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node

      - name: Run security audit
        run: yarn npm audit

  snyk:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_test_environment == 'none' }}
    name: Snyk scan docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Get Snyk OAuth Token
        id: snyk-auth
        run: |
          TOKEN=$(curl -s -X POST "https://api.snyk.io/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.SNYK_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.SNYK_CLIENT_SECRET }}" \
            | jq -r '.access_token')

          echo "SNYK_OAUTH_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Build local Docker image
        run: |
          docker build \
            --tag laa-inquests-internal-ui:scan \
            --file Dockerfile .

      - name: Run Snyk to scan Docker image
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        with:
          image: laa-inquests-internal-ui:scan
          args: --docker --severity-threshold=high --policy-path=.snyk
        env:
          SNYK_OAUTH_TOKEN: ${{ env.SNYK_OAUTH_TOKEN }}

      - name: Monitor docker image using Snyk
        continue-on-error: true
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_OAUTH_TOKEN: ${{ env.SNYK_OAUTH_TOKEN }}
        with:
          command: monitor
          image: laa-inquests-internal-ui:scan
          args: --file=Dockerfile --policy-path=.snyk

  unit-tests:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_test_environment == 'none' }}
    name: Mocha Unit Tests
    uses: ./.github/workflows/unit-tests.yaml

  e2e-tests:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_test_environment == 'none' }}
    name: Playwright Tests
    uses: ./.github/workflows/e2e-tests.yaml

  deploy:
    if: ${{ !contains(github.actor, '[bot]') && (github.event_name != 'workflow_dispatch' || inputs.notify_test_environment == 'none') }}
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout
    needs:
      - e2e-tests
      - unit-tests
      - snyk
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Deploy to uat
        uses: ./.github/actions/deploy
        with:
          app-environment: uat
          auth_client_id: ${{ vars.AUTH_CLIENT_ID }}
          auth_client_secret: ${{ vars.AUTH_CLIENT_SECRET }}
          auth_directory_url: ${{ vars.AUTH_DIRECTORY_URL }}
          auth_post_logout_uri: ${{ vars.AUTH_POST_LOGOUT_URI }}
          auth_redirect_uri: ${{ vars.AUTH_REDIRECT_URI }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-region: ${{ vars.ECR_REGION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-sha: ${{ github.sha }}
          github-ref-name: ${{ github.ref_name }}
          github-head-ref: ${{ github.head_ref }}
          image-tag: ${{ github.sha }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          inquests_api_url: ${{ vars.INQUESTS_API_URL }}
  notify-slack:
    environment: uat
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'workflow_dispatch' || inputs.notify_test_environment == 'none') && always() && github.ref_name == 'main' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Send Slack Notification
        uses: ./.github/actions/notify
        with:
          app-environment: uat
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL_UAT }}
          pipeline_status: "${{ job.status }} ${{ join(needs.*.result, ' ') }}"

  notify-slack-staging-manual-test:
    environment: staging
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.notify_test_environment == 'staging' || inputs.notify_test_environment == 'both')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Send Slack Notification (Staging Test)
        uses: ./.github/actions/notify
        with:
          app-environment: staging
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL_STAGING }}
          pipeline_status: "${{ inputs.notify_test_status }}"

  notify-slack-prod-manual-test:
    environment: production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.notify_test_environment == 'prod' || inputs.notify_test_environment == 'both')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Send Slack Notification (Prod Test)
        uses: ./.github/actions/notify
        with:
          app-environment: prod
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
          pipeline_status: "${{ inputs.notify_test_status }}"
