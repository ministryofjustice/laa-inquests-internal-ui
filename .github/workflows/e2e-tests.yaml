name: Playwright Tests
on:
  workflow_dispatch: # Allow manual triggering only
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  playwright:
    name: Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Mark this job as required for PR checks
    outputs:
      status: ${{ job.status }}
    services:
      api-db:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d api" --health-interval 5s
          --health-timeout 3s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0 # Fetch all history for proper change detection

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node

      - name: Build application
        run: yarn build

      - name: Install Playwright Chromium
        run: yarn playwright install chromium --with-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key:
            ${{ runner.os }}-playwright-chromium-${{ hashFiles('**/yarn.lock')
            }}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull API image from GHCR
        run: docker pull ghcr.io/ministryofjustice/laa-inquests-api:latest

      - name: Run API database migrations
        run: |
          docker run --rm --network host \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e DB_NAME=api \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            ghcr.io/ministryofjustice/laa-inquests-api:latest \
            alembic upgrade head

      - name: Start API container
        run: |
          docker run -d --name inquests-api --network host \
            -e SECRET_KEY=TEST_KEY \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e DB_NAME=api \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            ghcr.io/ministryofjustice/laa-inquests-api:latest

      - name: Wait for API to be ready
        run: |
          echo "Waiting for the API to become ready..."
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8027/ > /dev/null; then
              echo "API is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become ready within 120 seconds"
          docker logs inquests-api
          exit 1
      - name: Run Playwright tests
        run: yarn test:e2e
        env:
          CI: true
          PLAYWRIGHT_TRACING: "on" # Enable tracing for all tests
          # Add session-related environment variables
          SESSION_SECRET: "playwright-test-secret"
          SESSION_NAME: "sessionId"
          NODE_ENV: "test"
          # Add other required environment variables
          SERVICE_NAME: "Inquests"
          SERVICE_PHASE: "Alpha"
          DEPARTMENT_NAME: "LAA Digital"
          DEPARTMENT_URL: "https://www.gov.uk/government/organisations/legal-aid-agency"
          CONTACT_EMAIL: "your-team@digital.justice.gov.uk"
          INQUESTS_API_URL: "https://laa-inquests-api-uat.apps.live.cloud-platform.service.justice.gov.uk"
          SERVICE_URL: "https://www.gov.uk/legal-aid"
          RATELIMIT_HEADERS_ENABLED: "true"
          RATE_LIMIT_MAX: "100"
          RATE_WINDOW_MS: "900000"
      - name: Show API logs on failure
        if: failure()
        run: docker logs inquests-api

      - name: Stop API container
        if: always()
        run: docker rm -f inquests-api || true
      - name: Upload trace artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-traces
          path: |
            test-results/**/trace*.zip
            test-results/**/*.webm
          retention-days: 14

      - name: Notify on test failure
        if: failure()
        run:
          echo "::error::Playwright tests failed! Check the test report for
          details."
